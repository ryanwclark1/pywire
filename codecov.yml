coverage:
  precision: 2
  round: down
  range: "100...100"
  status:
    project:
      default:
        target: 100%
        threshold: 0%
        if_ci_failed: error
    patch:
      default:
        target: 100%
        threshold: 0%
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,tree"
  require_changes: false

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: python
      paths:
        - pywire/
    - name: rust
      paths:
        - src/

ignore:
  - "docs/**"
  - "tests/**"
  - "scripts/**"
  - "benches/**"
  - "target/**"
