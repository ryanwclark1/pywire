[build-system]
requires = ["maturin>=1.8,<2.0"]
build-backend = "maturin"

[project]
name = "pywire"
version = "0.1.0"
description = "Python bindings for the Rust pgwire library"
requires-python = ">=3.9"

[tool.maturin]
python-source = "."
module-name = "pywire._pywire"
features = ["pyo3/extension-module"]

[tool.pytest.ini_options]
testpaths = ["tests"]
