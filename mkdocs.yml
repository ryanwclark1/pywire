site_name: pywire
site_description: Python bindings for the Rust pgwire library
site_url: https://ryanwclark1.github.io/pywire/
repo_url: https://github.com/ryanwclark1/pywire
repo_name: ryanwclark1/pywire
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Wire protocol concepts: concepts.md
  - API reference:
      - Overview: api.md
      - Errors: api/errors.md
      - Messages: api/messages.md
      - Auth: api/auth.md
      - Query: api/query.md
  - Versioning: versioning.md
  - Releasing: releasing.md
  - Contributing: contributing.md

strict: true
