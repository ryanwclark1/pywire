# cargo-deny config. Run locally with `cargo deny check` after
# `cargo install cargo-deny --locked`. See
# https://embarkstudios.github.io/cargo-deny/ for full schema.

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
